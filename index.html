<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>吉方位ナビ</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:sans-serif;
background:black;
color:white;
text-align:center;
}

#map{
height:80vh;
width:100%;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:10px;
}

.shrine{
background:#ffcc00;
}

.food{
background:#ff6666;
}

</style>

</head>

<body>

<h2>🔮 吉方位ナビ</h2>

<button onclick="searchShrines()" class="shrine">⛩ 神社</button>
<button onclick="searchFood()" class="food">🍽 開運フード</button>

<div id="map"></div>

<script>

let map;
let center;

function initMap(){

navigator.geolocation.getCurrentPosition(position=>{

center={
lat:position.coords.latitude,
lng:position.coords.longitude
};

map=new google.maps.Map(document.getElementById("map"),{
zoom:14,
center:center
});

new google.maps.Marker({
position:center,
map:map,
title:"現在地"
});

drawLuckyDirections();

});

}

function drawLuckyDirections(){

const colors=[
"#ff0000",
"#ff8800",
"#ffff00",
"#00ff00",
"#00ffff",
"#0088ff",
"#8800ff",
"#ff00ff"
];

for(let i=0;i<8;i++){

let start=i*45;
let end=start+45;

let triangle=new google.maps.Polygon({
paths:createSector(center,5000,start,end),
strokeOpacity:0,
fillColor:colors[i],
fillOpacity:0.25,
map:map
});

}

}

function createSector(center,radius,startAngle,endAngle){

let points=[center];

for(let angle=startAngle;angle<=endAngle;angle+=5){

let rad=angle*Math.PI/180;

let lat=center.lat+(radius/111320)*Math.cos(rad);
let lng=center.lng+(radius/(111320*Math.cos(center.lat*Math.PI/180)))*Math.sin(rad);

points.push({lat:lat,lng:lng});

}

points.push(center);

return points;

}

function searchShrines(){

const request={
location:center,
radius:3000,
keyword:"神社"
};

const service=new google.maps.places.PlacesService(map);

service.nearbySearch(request,(results,status)=>{

if(status===google.maps.places.PlacesServiceStatus.OK){

results.forEach(place=>{

new google.maps.Marker({
map:map,
position:place.geometry.location,
icon:"https://maps.google.com/mapfiles/ms/icons/yellow-dot.png"
});

});

}

});

}

function searchFood(){

const request={
location:center,
radius:3000,
type:"restaurant"
};

const service=new google.maps.places.PlacesService(map);

service.nearbySearch(request,(results,status)=>{

if(status===google.maps.places.PlacesServiceStatus.OK){

results.forEach(place=>{

new google.maps.Marker({
map:map,
position:place.geometry.location,
icon:"https://maps.google.com/mapfiles/ms/icons/red-dot.png"
});

});

}

});

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBzk1mv7n0qNsSUpaG1mdtgPh_UV5K7zM&libraries=places&callback=initMap" async defer></script>

</body>
</html>
