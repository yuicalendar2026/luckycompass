<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>吉方位ナビ LuckyCompass</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:sans-serif;
margin:0;
background:#0c0c16;
color:white;
}

header{
text-align:center;
padding:15px;
background:#111;
}

h1{
margin:0;
color:gold;
}

#map{
height:70vh;
width:100%;
}

#panel{
padding:15px;
background:#1a1a2b;
}

input,button{
padding:8px;
margin:4px;
border-radius:6px;
border:none;
}

button{
background:gold;
font-weight:bold;
}

.feature{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<header>

<h1>🧭 吉方位ナビ LuckyCompass</h1>

<div>

<input type="date" id="birth">

<button onclick="calc()">吉方位計算</button>

<button onclick="saveHome()">🏠自宅保存</button>

<button onclick="searchShrine()">⛩神社</button>

<button onclick="searchFood()">🍜開運グルメ</button>

</div>

</header>

<div id="map"></div>

<div id="panel">

<div class="feature">

🧭 吉方位地図  
🔮 九星気学  
🏠 自宅登録  
⛩ 神社検索  
🍜 開運グルメ  
📿 デジタル御朱印  
📍 スポット詳細  

</div>

<div id="result"></div>

</div>

<script>

let map
let userPos
let homePos

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
zoom:12,
center:{lat:35,lng:135},
styles:[
{elementType:"geometry",stylers:[{color:"#0c0c16"}]},
{elementType:"labels.text.fill",stylers:[{color:"#ffffff"}]}
]
})

navigator.geolocation.getCurrentPosition(pos=>{

userPos={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

map.setCenter(userPos)

new google.maps.Marker({
position:userPos,
map:map,
title:"現在地"
})

})

}

function calc(){

let birth=document.getElementById("birth").value

if(!birth)return

let year=new Date(birth).getFullYear()

let num=(year%9)||9

let star=9-num+1

let dir=["北","南","東","西","北東","北西","南東","南西"]

let lucky=dir[Math.floor(Math.random()*dir.length)]

document.getElementById("result").innerHTML=

"あなたの本命星："+star+"<br>"+
"今日の吉方位："+lucky

drawLucky()

}

function drawLucky(){

let center=map.getCenter()

let triangle=[
{lat:center.lat(),lng:center.lng()},
{lat:center.lat()+0.5,lng:center.lng()+0.3},
{lat:center.lat()+0.5,lng:center.lng()-0.3}
]

new google.maps.Polygon({
paths:triangle,
map:map,
fillColor:"gold",
fillOpacity:0.3,
strokeColor:"gold"
})

}

function saveHome(){

let center=map.getCenter()

homePos=center

localStorage.setItem("home",JSON.stringify(center))

new google.maps.Marker({
position:center,
map:map,
icon:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
title:"自宅"
})

}

function searchShrine(){

let service=new google.maps.places.PlacesService(map)

service.nearbySearch({
location:map.getCenter(),
radius:5000,
keyword:"神社"
},showPlaces)

}

function searchFood(){

let service=new google.maps.places.PlacesService(map)

service.nearbySearch({
location:map.getCenter(),
radius:5000,
type:"restaurant"
},showPlaces)

}

function showPlaces(results){

for(let place of results){

let marker=new google.maps.Marker({
map:map,
position:place.geometry.location
})

let infowindow=new google.maps.InfoWindow({
content:
"<b>"+place.name+"</b><br>"+
"<button onclick='goshuin(\""+place.name+"\")'>参拝チェックイン</button><br>"+
"<a target='_blank' href='https://www.google.com/maps/search/?api=1&query="+
place.geometry.location.lat()+","+place.geometry.location.lng()+
"'>詳細</a>"
})

marker.addListener("click",()=>{
infowindow.open(map,marker)
})

}

}

function goshuin(name){

alert("📿 デジタル御朱印GET！\n"+name)

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBzk1mv7n0qNsSUpaG1mdtgPh_UV5K7zM&libraries=places&callback=initMap" async defer></script>

</body>
</html>
